
<style>
#erd1 { padding: 0.5rem 0; }
#erd1 svg { width: 100%; }
.erd-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--color-border-tertiary); }
</style>
<div class="erd-title">Tablas del perfil — mis recetas, quedadas, restaurantes, viajes y experiencias</div>
<div id="erd1"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1e3a3a' : '#e1f5ee',
    primaryBorderColor: dark ? '#0f6e56' : '#0f6e56',
    primaryTextColor: dark ? '#9fe1cb' : '#085041',
  },
});
const diagram = `erDiagram
  perfiles {
    uuid user_id PK
    text nick
    text nombre
    text bio
    text ciudad
    text diagnostico
    text dieta
    text fecha_nacimiento
    text avatar_url
    text cover_url
    text insignia_emoji
    text insignia_nombre
    bool es_fundador
    bool is_online
    timestamp created_at
  }
  mis_recetas {
    uuid id PK
    uuid user_id FK
    text titulo
    text cat
    text tiempo
    text dif
    text texto
    text emoji
    text color
    text foto_url
    timestamp created_at
  }
  mis_recetas_likes {
    uuid id PK
    uuid receta_id FK
    uuid user_id FK
    int voto
    timestamp created_at
  }
  mis_quedadas {
    uuid id PK
    uuid user_id FK
    text nombre
    text emoji
    text fecha
    text hora
    text lugar
    text precio
    text descripcion
    text estado
    timestamp created_at
  }
  mis_quedadas_likes {
    uuid id PK
    uuid quedada_id FK
    uuid user_id FK
    int voto
    timestamp created_at
  }
  mis_restaurantes {
    uuid id PK
    uuid user_id FK
    text nombre
    text direccion
    text fecha
    numeric puntuacion
    text comentario
    int likes_count
    timestamp created_at
  }
  mis_restaurantes_likes {
    uuid com_restaurante_id FK
    uuid user_id FK
    int voto
    timestamp created_at
  }
  mis_viajes {
    uuid id PK
    uuid user_id FK
    text destino
    text emoji
    text fecha
    text fecha_iso
    text duracion
    numeric puntuacion
    text companeros
    text restaurantes
    int likes_count
    timestamp created_at
  }
  mis_viajes_likes {
    uuid com_viaje_id FK
    uuid user_id FK
    int voto
    timestamp created_at
  }
  mis_experiencias {
    uuid id PK
    uuid user_id FK
    text destino
    text emoji
    text fecha
    text texto
    int estrellas
    int likes_count
    timestamp created_at
  }
  mis_experiencias_likes {
    uuid com_experiencia_id FK
    uuid user_id FK
    int voto
    timestamp created_at
  }
  amigos {
    int id PK
    uuid user_id FK
    uuid amigo_user_id FK
    text amigo_nick
    timestamp created_at
  }
  solicitudes_amistad {
    int id PK
    uuid de_user_id FK
    uuid para_user_id FK
    text de_nick
    text estado
    timestamp created_at
  }
  bloqueos {
    int id PK
    uuid user_id FK
    uuid bloqueado_id FK
    text bloqueado_nick
    timestamp created_at
  }

  perfiles ||--o{ mis_recetas : "publica"
  perfiles ||--o{ mis_quedadas : "organiza"
  perfiles ||--o{ mis_restaurantes : "recomienda"
  perfiles ||--o{ mis_viajes : "registra"
  perfiles ||--o{ mis_experiencias : "comparte"
  perfiles ||--o{ amigos : "tiene"
  perfiles ||--o{ solicitudes_amistad : "envía"
  perfiles ||--o{ bloqueos : "gestiona"
  mis_recetas ||--o{ mis_recetas_likes : "recibe"
  mis_quedadas ||--o{ mis_quedadas_likes : "recibe"
  mis_restaurantes ||--o{ mis_restaurantes_likes : "recibe"
  mis_viajes ||--o{ mis_viajes_likes : "recibe"
  mis_experiencias ||--o{ mis_experiencias_likes : "recibe"
`;
const { svg } = await mermaid.render('erd1-svg', diagram);
document.getElementById('erd1').innerHTML = svg;
document.querySelectorAll('#erd1 svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd1 svg .row-rect-odd path, #erd1 svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
